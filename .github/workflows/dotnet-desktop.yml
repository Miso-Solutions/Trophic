name: .NET Desktop Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration ${{ matrix.configuration }} --no-restore

    - name: Test
      run: dotnet test --configuration ${{ matrix.configuration }} --no-build

    - name: Publish
      run: dotnet publish src/Trophic/Trophic.csproj --configuration ${{ matrix.configuration }} --output publish

    - name: Verify publish output
      shell: pwsh
      run: |
        $exe = "publish/Trophic.exe"
        $lib = "publish/lib"
        $missing = @()
        if (-not (Test-Path $exe)) { $missing += $exe }
        if (-not (Test-Path $lib)) { $missing += $lib }
        if ($missing.Count -gt 0) {
          Write-Error "Publish verification failed — missing: $($missing -join ', ')"
          Get-ChildItem publish/ -Recurse | Select-Object FullName
          exit 1
        }
        Write-Host "Publish OK: Trophic.exe and lib/ directory present"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Trophic
        path: publish/
        retention-days: 30
